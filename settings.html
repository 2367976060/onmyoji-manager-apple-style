<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>阴阳师账号管理器 - 设置</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="safe-top"></div>
    <div class="container">
        <section class="view active">
            <h1 class="ios-title">设置</h1>
            
            <!-- 管理员专属功能区 -->
            <div class="ios-group-title" id="adminSectionTitle" style="display:none;">👑 管理员功能</div>
            <div class="ios-group" id="adminSection" style="display:none;">
                <div class="ios-item" onclick="openApprovalModal()">
                    <div class="ios-item-content">
                        <div class="ios-item-title" style="color:var(--ios-orange);">用户注册审批</div>
                        <div class="ios-item-subtitle">审批新用户注册申请</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <div class="ios-item" onclick="openAddUserModal()">
                    <div class="ios-item-content">
                        <div class="ios-item-title" style="color:var(--ios-blue);">手动添加用户</div>
                        <div class="ios-item-subtitle">直接创建用户账号</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <div class="ios-item" onclick="openUserManageModal()">
                    <div class="ios-item-content">
                        <div class="ios-item-title" style="color:var(--ios-green);">用户列表管理</div>
                        <div class="ios-item-subtitle">修改权限、重置密码、删除用户</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
            </div>
            
            <div class="ios-group-title">通用设置</div>
            <div class="ios-group">
                <div class="ios-item" onclick="openDefaultSettings()">
                    <div class="ios-item-content">
                        <div class="ios-item-title">默认配置</div>
                        <div class="ios-item-subtitle">默认密码、手机号列表</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <div class="ios-item" onclick="openShikigamiManage()">
                    <div class="ios-item-content">
                        <div class="ios-item-title">式神图鉴</div>
                        <div class="ios-item-subtitle">管理式神列表和图标</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
            </div>
            <div class="ios-group-title">数据管理</div>
            <div class="ios-group">
                <div class="ios-item" onclick="exportData()">
                    <div class="ios-item-content">
                        <div class="ios-item-title">备份导出</div>
                        <div class="ios-item-subtitle">导出所有数据为JSON</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <div class="ios-item" onclick="document.getElementById('importFile').click()">
                    <div class="ios-item-content">
                        <div class="ios-item-title">备份导入</div>
                        <div class="ios-item-subtitle">从JSON文件恢复数据</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <input type="file" id="importFile" class="hidden-input" accept=".json" onchange="importData(event)">
                <div class="ios-item" onclick="openRecycleBin()">
                    <div class="ios-item-content">
                        <div class="ios-item-title">回收站</div>
                        <div class="ios-item-subtitle">已删除的账号</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
            </div>
            <div class="ios-group-title">账号操作</div>
            <div class="ios-group">
                <div class="ios-item" onclick="logout()">
                    <div class="ios-item-content">
                        <div class="ios-item-title" style="color: var(--ios-blue);">退出登录</div>
                        <div class="ios-item-subtitle">返回登录页面</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
                <div class="ios-item" onclick="clearAllData()">
                    <div class="ios-item-content">
                        <div class="ios-item-title" style="color: var(--ios-red);">清空所有数据</div>
                        <div class="ios-item-subtitle">不可恢复，请谨慎操作</div>
                    </div>
                    <span class="ios-item-arrow">›</span>
                </div>
            </div>
        </section>
    </div>
    
    <nav class="ios-tab-bar">
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('home')">
            <span class="ios-tab-icon">🏠</span>
            <span class="ios-tab-label">首页</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('accounts')">
            <span class="ios-tab-icon">📦</span>
            <span class="ios-tab-label">账号库</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('grind')">
            <span class="ios-tab-icon">⚔️</span>
            <span class="ios-tab-label">刷号</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('sales')">
            <span class="ios-tab-icon">💰</span>
            <span class="ios-tab-label">销售</span>
        </a>
        <a class="ios-tab-item active" onclick="event.preventDefault();navigateTo('settings')">
            <span class="ios-tab-icon">⚙️</span>
            <span class="ios-tab-label">设置</span>
        </a>
    </nav>

    <!-- 用户注册审批弹窗 -->
    <div class="ios-modal" id="approvalModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">用户注册审批</h3>
                <button class="ios-modal-close" onclick="closeModal('approvalModal')">×</button>
            </div>
            <div id="approvalList"></div>
        </div>
    </div>

    <!-- 手动添加用户弹窗 -->
    <div class="ios-modal" id="addUserModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">手动添加用户</h3>
                <button class="ios-modal-close" onclick="closeModal('addUserModal')">×</button>
            </div>
            <form id="addUserForm">
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">用户名/账号</label>
                    <input type="text" class="ios-form-input" id="newUserUsername" required placeholder="输入用户名">
                </div>
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">密码</label>
                    <input type="password" class="ios-form-input" id="newUserPassword" required placeholder="输入密码">
                </div>
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">确认密码</label>
                    <input type="password" class="ios-form-input" id="newUserPassword2" required placeholder="再次输入密码">
                </div>
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">用户权限</label>
                    <select class="ios-form-select" id="newUserRole">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="ios-modal-footer">
                    <button type="button" class="ios-btn ios-btn-gray" onclick="closeModal('addUserModal')">取消</button>
                    <button type="submit" class="ios-btn ios-btn-primary">创建用户</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 用户列表管理弹窗 -->
    <div class="ios-modal" id="userManageModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">用户列表管理</h3>
                <button class="ios-modal-close" onclick="closeModal('userManageModal')">×</button>
            </div>
            <div id="userManageList"></div>
        </div>
    </div>

    <!-- 重置密码弹窗 -->
    <div class="ios-modal" id="resetPasswordModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">重置用户密码</h3>
                <button class="ios-modal-close" onclick="closeModal('resetPasswordModal')">×</button>
            </div>
            <form id="resetPasswordForm">
                <input type="hidden" id="resetUsername">
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">新密码</label>
                    <input type="password" class="ios-form-input" id="resetNewPassword" required placeholder="输入新密码">
                </div>
                <div class="ios-modal-footer">
                    <button type="button" class="ios-btn ios-btn-gray" onclick="closeModal('resetPasswordModal')">取消</button>
                    <button type="submit" class="ios-btn ios-btn-primary">确认重置</button>
                </div>
            </form>
        </div>
    </div>

    <div class="ios-modal" id="defaultModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">默认配置</h3>
                <button class="ios-modal-close" onclick="closeModal('defaultModal')">×</button>
            </div>
            <form id="defaultForm">
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">默认密码</label>
                    <input type="text" class="ios-form-input" id="defaultPassword" placeholder="147258369Hh">
                </div>
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">手机号列表（每行一个）</label>
                    <textarea class="ios-form-input" id="phoneList" rows="4" placeholder="13800138000"></textarea>
                </div>
                <div class="ios-modal-footer">
                    <button type="button" class="ios-btn ios-btn-gray" onclick="closeModal('defaultModal')">取消</button>
                    <button type="submit" class="ios-btn ios-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="ios-modal" id="shikigamiModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">式神图鉴管理</h3>
                <button class="ios-modal-close" onclick="closeModal('shikigamiModal')">×</button>
            </div>
            <div id="shikigamiAddForm" class="ios-form-group">
                <div style="display: flex; gap: 10px; align-items: flex-end;">
                    <div style="flex:1;">
                        <label class="ios-form-label">新式神名称</label>
                        <input type="text" class="ios-form-input" id="newShikigamiName" placeholder="式神名称">
                    </div>
                    <div>
                        <label class="ios-form-label">图标</label>
                        <div style="display:flex;gap:10px;align-items:center;">
                            <img id="newShikigamiIconPreview" class="image-preview" onclick="document.getElementById('newShikigamiIcon').click()" src="" style="display:none;">
                            <button type="button" class="ios-btn ios-btn-primary ios-btn-sm" onclick="document.getElementById('newShikigamiIcon').click()">上传</button>
                            <input type="file" id="newShikigamiIcon" class="hidden-input" accept="image/*" onchange="previewNewIcon(event)">
                        </div>
                    </div>
                    <button type="button" class="ios-btn ios-btn-primary ios-btn-sm" onclick="addShikigami()" style="white-space:nowrap;">添加</button>
                </div>
            </div>
            <div id="shikigamiManageList"></div>
        </div>
    </div>

    <div class="ios-modal" id="editShikigamiModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">编辑式神</h3>
                <button class="ios-modal-close" onclick="closeModal('editShikigamiModal')">×</button>
            </div>
            <form id="editShikigamiForm">
                <input type="hidden" id="editShikigamiId">
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">式神名称</label>
                    <input type="text" class="ios-form-input" id="editShikigamiName" required>
                </div>
                <div id="shikigamiAddForm" class="ios-form-group">
                    <label class="ios-form-label">式神图标</label>
                    <div style="display:flex;gap:14px;align-items:center;">
                        <img id="editShikigamiIconPreview" class="image-preview" onclick="document.getElementById('editShikigamiIcon').click()">
                        <button type="button" class="ios-btn ios-btn-gray ios-btn-sm" onclick="document.getElementById('editShikigamiIcon').click()">更换图标</button>
                        <input type="file" id="editShikigamiIcon" class="hidden-input" accept="image/*" onchange="previewEditIcon(event)">
                    </div>
                </div>
                <div class="ios-modal-footer">
                    <button type="button" class="ios-btn ios-btn-gray" onclick="closeModal('editShikigamiModal')">取消</button>
                    <button type="submit" class="ios-btn ios-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="ios-modal" id="recycleModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">回收站</h3>
                <button class="ios-modal-close" onclick="closeModal('recycleModal')">×</button>
            </div>
            <div id="recycleList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // 先检查认证
            checkAuth();
            
            // 等待currentUser被设置
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // 检查是否是管理员，显示管理员功能区
            if (currentUser && currentUser.isAdmin) {
                document.getElementById('adminSectionTitle').style.display = 'block';
                document.getElementById('adminSection').style.display = 'block';
            }
            
            document.querySelectorAll('.ios-tab-item')[4].classList.add('active');
            
            // 绑定添加用户表单
            const addUserForm = document.getElementById('addUserForm');
            if (addUserForm) {
                addUserForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const username = document.getElementById('newUserUsername').value.trim();
                    const password = document.getElementById('newUserPassword').value;
                    const password2 = document.getElementById('newUserPassword2').value;
                    const role = document.getElementById('newUserRole').value;
                    
                    if (password !== password2) {
                        showToast('两次输入的密码不一致');
                        return;
                    }
                    if (password.length < 6) {
                        showToast('密码长度至少6位');
                        return;
                    }
                    
                    const success = await adminAddUser(username, password, role === 'admin');
                    if (success) {
                        closeModal('addUserModal');
                        addUserForm.reset();
                    }
                });
            }
            
            // 绑定重置密码表单
            const resetPasswordForm = document.getElementById('resetPasswordForm');
            if (resetPasswordForm) {
                resetPasswordForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const username = document.getElementById('resetUsername').value;
                    const newPassword = document.getElementById('resetNewPassword').value;
                    
                    if (newPassword.length < 6) {
                        showToast('密码长度至少6位');
                        return;
                    }
                    
                    const success = await adminResetPassword(username, newPassword);
                    if (success) {
                        closeModal('resetPasswordModal');
                        resetPasswordForm.reset();
                        await renderUserManageList();
                    }
                });
            }
        });
    </script>
</body>
</html>
