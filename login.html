<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>阴阳师账号管理器 - 登录</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #8E8E93;
        }
        .login-form-group {
            margin-bottom: 20px;
        }
        .login-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .login-input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #E5E5EA;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            border-color: #007AFF;
        }
        .login-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .login-checkbox input {
            width: 20px;
            height: 20px;
            accent-color: #007AFF;
        }
        .login-checkbox label {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .login-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }
        .login-link {
            color: #007AFF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">🎮</div>
                <h1 class="login-title">阴阳师账号管理器</h1>
                <p class="login-subtitle">专业的账号库存管理系统</p>
            </div>
            
            <form id="loginForm">
                <div class="login-form-group">
                    <label class="login-label">账号</label>
                    <input type="text" class="login-input" id="loginUsername" placeholder="请输入账号" required>
                </div>
                
                <div class="login-form-group">
                    <label class="login-label">密码</label>
                    <input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" required>
                </div>
                
                <div class="login-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">记住密码</label>
                </div>
                
                <button type="submit" class="login-btn">登 录</button>
            </form>
            
            <div class="login-footer">
                <a href="register.html" class="login-link">还没有账号？立即注册</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            checkAuth();
            
            // 记住密码自动填充
            const savedUsername = localStorage.getItem('remember_username');
            const savedPassword = localStorage.getItem('remember_password');
            if (savedUsername && savedPassword) {
                document.getElementById('loginUsername').value = savedUsername;
                document.getElementById('loginPassword').value = savedPassword;
                document.getElementById('rememberMe').checked = true;
            }
            
            // 登录表单提交
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const rememberMe = document.getElementById('rememberMe').checked;
                
                const success = await loginUser(username, password);
                if (success) {
                    // 记住密码
                    if (rememberMe) {
                        localStorage.setItem('remember_username', username);
                        localStorage.setItem('remember_password', password);
                    } else {
                        localStorage.removeItem('remember_username');
                        localStorage.removeItem('remember_password');
                    }
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>
</html>
