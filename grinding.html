<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>阴阳师账号管理器 - 刷号管理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="safe-top"></div>
    <div class="container">
        <section class="view active">
            <h1 class="ios-title">刷号管理</h1>
            <div class="ios-stats-grid">
                <div class="ios-stat-card">
                    <div class="ios-stat-value red" id="grindTodo">0</div>
                    <div class="ios-stat-label">今日待刷</div>
                </div>
                <div class="ios-stat-card clickable" onclick="showGrindDetail()">
                    <div class="ios-stat-value green" id="grindDone">0</div>
                    <div class="ios-stat-label">今日已刷</div>
                </div>
            </div>
            <div id="grindList"></div>
        </section>
    </div>
    
    <nav class="ios-tab-bar">
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('home')">
            <span class="ios-tab-icon">🏠</span>
            <span class="ios-tab-label">首页</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('accounts')">
            <span class="ios-tab-icon">📦</span>
            <span class="ios-tab-label">账号库</span>
        </a>
        <a class="ios-tab-item active" onclick="event.preventDefault();navigateTo('grind')">
            <span class="ios-tab-icon">⚔️</span>
            <span class="ios-tab-label">刷号</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('sales')">
            <span class="ios-tab-icon">💰</span>
            <span class="ios-tab-label">销售</span>
        </a>
        <a class="ios-tab-item" onclick="event.preventDefault();navigateTo('settings')">
            <span class="ios-tab-icon">⚙️</span>
            <span class="ios-tab-label">设置</span>
        </a>
    </nav>

    <div class="ios-modal" id="grindDetailModal">
        <div class="ios-modal-content">
            <div class="ios-modal-header">
                <h3 class="ios-modal-title">今日已刷详情</h3>
                <button class="ios-modal-close" onclick="closeModal('grindDetailModal')">×</button>
            </div>
            <div id="grindDetailList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initData();
            renderGrind();
            // 设置导航激活状态
            document.querySelectorAll('.ios-tab-item')[2].classList.add('active');
        });
    </script>
</body>
</html>
